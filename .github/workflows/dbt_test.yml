name: dbt-test

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"

jobs:
  dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: dbt tests (DuckDB dev)
        working-directory: warehouse/dbt_project
        run: |
          python -m pip install dbt-duckdb
          dbt deps
          dbt seed --target dev
          dbt run --target dev
          dbt test --target dev
