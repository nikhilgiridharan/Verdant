name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ruff
        run: |
          python -m pip install ruff
          ruff check api ingestion processing ml data_quality tests
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: ESLint
        working-directory: dashboard
        run: |
          npm install
          npm run lint

  test-api:
    runs-on: ubuntu-latest
    env:
      CARBONPULSE_SKIP_LIFESPAN_DB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install API deps
        run: |
          python -m pip install -r api/requirements.txt pytest
      - name: Pytest
        working-directory: api
        run: pytest -q

  test-dbt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: dbt
        working-directory: warehouse/dbt_project
        run: |
          python -m pip install dbt-duckdb
          dbt deps
          dbt seed --target dev
          dbt run --target dev
          dbt test --target dev

  build-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        working-directory: dashboard
        run: |
          npm install
          npm run build
      - name: Verify dist
        run: test -f dashboard/dist/index.html
