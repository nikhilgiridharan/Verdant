version: 2

seeds:
  - name: suppliers
    description: >
      500 CarbonPulse supplier records with city-anchored coordinates (±0.8° jitter).
      Generated for trade-calibrated country mix including CA and TW.
      See docs/data/trade-calibration.md and ingestion/producer/trade_calibration.py.
    config:
      column_types:
        supplier_id: varchar(10)
        name: varchar(255)
        country: varchar(2)
        country_name: varchar(50)
        lat: float
        lng: float
        tier: integer
        industry: varchar(50)
    columns:
      - name: supplier_id
        description: Unique supplier identifier (SUP-00001–SUP-00500)
        tests:
          - not_null
          - unique
      - name: country
        description: ISO 2-letter country code
        tests:
          - not_null
          - accepted_values:
              values: ["CN", "US", "DE", "IN", "MX", "VN", "KR", "JP", "CA", "TW"]
      - name: lat
        description: Latitude (city-anchored with small offset)
        tests:
          - not_null
      - name: lng
        description: Longitude (city-anchored with small offset)
        tests:
          - not_null
      - name: tier
        description: Supplier tier (1=direct, 2=one removed, 3=deep chain)
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3]
      - name: industry
        description: Supplier industry vertical
        tests:
          - not_null
          - accepted_values:
              values:
                - Electronics
                - Apparel
                - Auto Parts
                - Food & Beverage
                - Chemicals
                - Industrial Machinery
                - Consumer Goods
                - Pharmaceuticals
                - Textiles
                - Packaging
